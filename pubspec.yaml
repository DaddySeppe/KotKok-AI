name: kotkok_ai
description: KotKok AI - an anti-food-waste cooking assistant for students and families.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  supabase_flutter: ^2.8.0
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.2
  http: ^1.2.2
  collection: ^1.19.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
